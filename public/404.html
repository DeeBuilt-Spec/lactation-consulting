<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Latched</title>
    <script>
      // GitHub Pages SPA fallback: preserve the requested path, then load the
      // app's index.html. On Pages this project is served under a route
      // (/lactation-consulting/), so we must redirect to that base — NOT the apex
      // root "/", which belongs to the landing page. We derive the base from
      // the first path segment, falling back to "/" for local/root serving.
      (function () {
        var path =
          window.location.pathname + window.location.search + window.location.hash;
        sessionStorage.setItem("redirect", path);
        var seg = window.location.pathname.split("/")[1];
        var base = seg ? "/" + seg + "/" : "/";
        window.location.replace(base);
      })();
    </script>
  </head>
  <body></body>
</html>
